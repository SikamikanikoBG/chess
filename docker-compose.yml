services:
  chess:
    build: .
    image: chess:latest
    container_name: chess
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8800}:8800"
    volumes:
      - chess-data:/app/data
    environment:
      - NODE_ENV=production
      # PORT/HOST/DB_PATH/STOCKFISH_PATH have sensible defaults baked into the image.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8800/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  chess-data:
